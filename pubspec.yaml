name: trip_genie
description: "A smart travel itinerary planner."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core Services
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  cloud_functions: ^4.6.0

  # User Authentication
  google_sign_in: ^6.2.1

  # State Management & Utilities
  provider: ^6.1.2
  intl: ^0.19.0
  google_generative_ai: ^0.4.6
  http: ^1.2.1
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.3

  # PDF Generation & File Management
  pdf: ^3.10.7
  printing: ^5.12.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1

  # URL Launcher for phone calls and links
  url_launcher: ^6.2.5

  # Android Intent helper (fallback for phone dialer on some Android devices)
  android_intent_plus: ^3.0.0

  # Share functionality
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.1
flutter:
  uses-material-design: true
  assets:
    - assets/google_logo.png
    - assets/backgrounds/auth_bg.jpg
    - assets/backgrounds/home_hero.jpg
    - assets/trip_genie_logo.png

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/trip_genie_logo.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/trip_genie_logo.png
    color: "#FFFFFF"

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/trip_genie_logo.png
  remove_alpha_ios: true